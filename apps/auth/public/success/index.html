<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Email verified</title>
		<style>
			:root {
				color-scheme: light;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				background: #fff;
				color: #111;
				font-family: "Times New Roman", Times, serif;
			}

			main {
				width: min(100%, 32rem);
				margin: 0 auto;
				padding: 4rem 1.5rem;
			}

			section {
				border: 1px solid #111;
				padding: 1.5rem;
				background: #fff;
			}

			h1 {
				margin: 0 0 0.5rem;
				font-size: 1.5rem;
				font-weight: 400;
			}

			p {
				margin: 0;
				line-height: 1.5;
			}

			.footer {
				margin-top: 1rem;
				font-size: 0.9rem;
			}
		</style>
	</head>
	<body>
		<main>
			<section>
				<h1>Email verified</h1>
				<p>Your email address has been confirmed successfully.</p>
				<p class="footer">You can return to the app and continue signing in.</p>
			</section>
		</main>
	</body>
</html>
